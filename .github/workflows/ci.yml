name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlruns/mlflow.db
      MLFLOW_ALLOW_FILE_STORE: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint code
        run: ruff check src tests data
      - name: Download dataset
        run: python data/raw/download_dataset.py
      - name: Generate EDA artifacts
        run: python -m src.data.generate_eda_artifacts
      - name: Train models
        run: python -m src.models.train
      - name: Run tests
        run: pytest -q
      - name: Validate Docker build
        run: docker build -f docker/Dockerfile -t heart-disease-api:ci .
